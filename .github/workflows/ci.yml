name: CI

# pull_request tests the merge preview (this PR combined with current main),
# so two individually-green PRs can't break main in combination, and it also
# covers PRs from forks. push is limited to main so each PR-branch push
# doesn't run the suite twice; the main run confirms every merge.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run test
